<!DOCTYPE html>
<html>
<head>
    <title>📝 মাই নোটস</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            font-family: system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            padding: 10px;
        }
        
        /* বড় লেখা দেখানোর জায়গা */
        .big-text-container {
            flex: 4;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }
        
        #bigTextBox {
            background: #1a1a1a;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 25px;
            border: 2px solid #333;
            padding: 20px;
            cursor: pointer;
        }
        
        #bigText {
            font-size: 60px;
            font-weight: bold;
            text-align: center;
            color: #fff;
        }
        
        /* একটা মাত্র লেখার বক্স - এখন অর্ধেক সাইজ */
        .single-item-box {
            background: #111;
            border-radius: 20px;
            padding: 10px;
            border: 1px solid #333;
            margin-bottom: 10px;
            flex: 1;
            max-height: 80px;  /* ছোট করে দিলাম */
            display: flex;
            flex-direction: column;
        }
        
        .section-title {
            color: #666;
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        /* একটা মাত্র লেখা আর ডিলিট বাটন এক লাইনে */
        .single-item {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        
        .item-text {
            color: #ddd;
            font-size: 16px;
            cursor: pointer;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 8px;
        }
        
        /* ডিলিট বাটন - ছোট */
        .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            font-size: 13px;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        /* নতুন লেখা যোগ - ছোট */
        .add-section {
            background: #111;
            border-radius: 20px;
            padding: 12px;
            border: 1px solid #333;
            flex: 0.8;
        }
        
        .add-box {
            display: flex;
            gap: 8px;
        }
        
        #newText {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 10px;
            background: #1a1a1a;
            color: white;
            border: 1px solid #333;
            font-size: 15px;
        }
        
        #addBtn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 0 18px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
        
        /* কপি মেসেজ */
        #copyMessage {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #4CAF50;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            display: none;
            z-index: 999;
        }
    </style>
</head>
<body>

    <div id="copyMessage">✅ কপি হয়েছে!</div>

    <!-- বড় লেখা দেখানোর বক্স -->
    <div class="big-text-container">
        <div id="bigTextBox" onclick="copyBigText()">
            <div id="bigText">👆 লেখা সিলেক্ট করুন</div>
        </div>
    </div>

    <!-- একটা মাত্র লেখার বক্স (অর্ধেক সাইজ) -->
    <div class="single-item-box">
        <div class="section-title">📋 আপনার লেখা</div>
        <div id="singleItemContainer" class="single-item">
            <!-- এখানে শুধু একটা আইটেম থাকবে -->
        </div>
    </div>

    <!-- নতুন লেখা যোগ -->
    <div class="add-section">
        <div class="add-box">
            <input type="text" id="newText" placeholder="নতুন লেখা লিখুন...">
            <button id="addBtn" onclick="addItem()">+</button>
        </div>
    </div>

    <script>
        // ডাটা লোড - শুধু একটা আইটেম রাখবো
        let currentItem = JSON.parse(localStorage.getItem('singleNote2')) || null;

        function saveItem() {
            if (currentItem) {
                localStorage.setItem('singleNote2', JSON.stringify(currentItem));
            } else {
                localStorage.removeItem('singleNote2');
            }
            displaySingleItem();
        }

        function addItem() {
            let input = document.getElementById('newText');
            let text = input.value.trim();
            
            if (text) {
                currentItem = {
                    id: Date.now(),
                    text: text
                };
                saveItem();
                input.value = '';
                
                // নতুন লেখা বড় বক্সে দেখান
                document.getElementById('bigText').innerText = text;
            }
        }

        async function copyBigText() {
            let bigText = document.getElementById('bigText').innerText;
            if (bigText !== '👆 লেখা সিলেক্ট করুন') {
                await navigator.clipboard.writeText(bigText);
                let msg = document.getElementById('copyMessage');
                msg.style.display = 'block';
                setTimeout(() => msg.style.display = 'none', 800);
            }
        }

        function deleteItem(event) {
            event.stopPropagation();
            if (currentItem && confirm('🗑️ ডিলিট করবেন?')) {
                currentItem = null;
                saveItem();
                document.getElementById('bigText').innerText = '👆 লেখা সিলেক্ট করুন';
            }
        }

        function showInBig() {
            if (currentItem) {
                document.getElementById('bigText').innerText = currentItem.text;
            }
        }

        function displaySingleItem() {
            let container = document.getElementById('singleItemContainer');
            
            if (currentItem) {
                container.innerHTML = `
                    <span class="item-text" onclick="showInBig()">${currentItem.text}</span>
                    <button class="delete-btn" onclick="deleteItem(event)">🗑️</button>
                `;
            } else {
                container.innerHTML = `
                    <span style="color: #666; flex:1; font-size: 14px;">কোন লেখা নেই</span>
                `;
            }
        }

        // শুরুতে দেখান
        displaySingleItem();
        
        if (currentItem) {
            document.getElementById('bigText').innerText = currentItem.text;
        }

        // এন্টার চাপলে যোগ হবে
        document.getElementById('newText').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addItem();
        });
    </script>

</body>
</html>
