<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EBH Team - Admin Panel</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --secondary: #3b82f6;
  --accent: #60a5fa;
  --danger: #ef4444;
  --success: #22c55e;
  --dark-bg: #0f172a;
  --card-bg: #1e293b;
  --text-light: #f8fafc;
  --text-gray: #94a3b8;
  --border-color: #334155;
  --shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--dark-bg);
  color: var(--text-light);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  padding: 10px;
}

.admin-container {
  max-width: 100%;
  margin: 0 auto;
  display: block;
  overflow-x: auto;
}

.header {
  text-align: center;
  margin-bottom: 15px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--primary);
}

.header h1 {
  color: var(--primary);
  font-size: 1.4rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}

.option-tabs {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 8px;
  background: var(--card-bg);
  padding: 8px;
  border-radius: 40px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border-color);
}

.option-tabs-row2 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-bottom: 15px;
  background: var(--card-bg);
  padding: 8px;
  border-radius: 40px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border-color);
}

.option-tab {
  padding: 10px 4px;
  border-radius: 30px;
  border: none;
  background: transparent;
  color: var(--text-gray);
  font-weight: 700;
  font-size: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  border: 1px solid transparent;
}

.option-tab.active {
  background: rgba(37, 99, 235, 0.2);
  color: var(--primary);
  border-color: var(--primary);
  box-shadow: 0 0 15px rgba(37, 99, 235, 0.3);
}

.stats-card {
  background: var(--card-bg);
  border-radius: 14px;
  padding: 12px 15px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-left: 4px solid var(--primary);
  border: 1px solid rgba(37, 99, 235, 0.2);
}

.stat { text-align: center; flex: 1; }
.stat .number { font-size: 1.4rem; font-weight: 800; color: var(--primary); display: block; }
.stat .label { font-size: 0.65rem; color: var(--text-gray); text-transform: uppercase; }
.divider { width: 1px; height: 30px; background: var(--border-color); }

.search-section {
  background: var(--card-bg);
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(59, 130, 246, 0.2);
}

.search-container { position: relative; }
.search-container input {
  width: 100%;
  padding: 12px 15px;
  padding-right: 75px;
  border-radius: 10px;
  border: 1px solid var(--border-color);
  background: rgba(15, 23, 42, 0.8);
  color: var(--text-light);
  font-size: 14px;
  height: 44px;
}
.search-container input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
}
.search-btn {
  position: absolute;
  right: 5px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--primary);
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  font-weight: 700;
  font-size: 0.75rem;
  height: 34px;
  box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
}

.main-card {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 15px 12px;
  margin-bottom: 15px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(96, 165, 250, 0.2);
  overflow-x: auto;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.card-title { font-size: 1rem; display: flex; align-items: center; gap: 8px; }
.card-title i { color: var(--primary); font-size: 1.2rem; }
.refresh-btn {
  background: transparent;
  border: 1px solid var(--primary);
  color: var(--primary);
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 0.75rem;
  font-weight: 600;
}

.accounts-container {
  background: rgba(15, 23, 42, 0.6);
  border: 1px solid var(--border-color);
  border-radius: 14px;
  margin-bottom: 12px;
  max-height: 400px;
  overflow-y: auto;
  min-height: 150px;
  overflow-x: auto;
}

.table-container {
  width: 100%;
  display: table;
  border-collapse: collapse;
  min-width: 500px;
}

.table-header {
  display: table-row;
  background: rgba(30, 41, 59, 0.95);
  position: sticky;
  top: 0;
  border-bottom: 2px solid var(--primary);
}

.header-cell {
  display: table-cell;
  padding: 10px 6px;
  font-weight: 700;
  font-size: 0.7rem;
  text-transform: uppercase;
  white-space: nowrap;
  position: sticky;
  top: 0;
  background: rgba(30, 41, 59, 0.95);
  border-right: 1px solid var(--border-color);
}
.header-cell:last-child { border-right: none; }

.account-row { display: table-row; border-bottom: 1px solid var(--border-color); }
.account-row:hover { background: rgba(37, 99, 235, 0.1); }

.password-group-header {
  display: table-row;
  background: rgba(37, 99, 235, 0.15);
  border-bottom: 2px solid var(--primary);
  border-top: 2px solid var(--primary);
  font-weight: bold;
}

.group-count {
  background: var(--primary);
  color: var(--dark-bg);
  padding: 2px 8px;
  border-radius: 30px;
  font-size: 0.7rem;
  margin-left: 8px;
  display: inline-block;
}

.row-cell {
  display: table-cell;
  padding: 8px 6px;
  vertical-align: middle;
  border-right: 1px solid var(--border-color);
  height: 42px;
  position: relative;
  overflow: hidden;
}
.row-cell:last-child { border-right: none; }

.cell-content {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  padding: 8px 6px;
  display: flex;
  align-items: center;
  overflow-x: auto;
  white-space: nowrap;
  font-family: 'Courier New', monospace;
  font-size: 0.75rem;
}

.serial-cell { width: 40px; min-width: 40px; text-align: center; position: sticky; left: 0; background: rgba(15, 23, 42, 0.9); z-index: 1; }

.count-display {
  text-align: right;
  padding: 8px 12px;
  font-size: 0.7rem;
  color: var(--text-gray);
  background: rgba(15, 23, 42, 0.8);
  border-top: 1px solid var(--border-color);
  border-radius: 0 0 14px 14px;
  margin-bottom: 12px;
}

.copy-single-btn {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  border-radius: 50px;
  padding: 14px 24px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-size: 1rem;
  font-weight: 800;
  width: 100%;
  max-width: 280px;
  margin: 15px auto;
  color: white;
  box-shadow: 0 8px 0 #1e3a8a;
  transition: 0.05s linear;
}
.copy-single-btn:active { transform: translateY(2px); box-shadow: 0 4px 0 #1e3a8a; }

.excel-download-container {
  display: flex;
  justify-content: center;
  margin: 15px 0 20px;
}
.excel-download-btn {
  background: linear-gradient(145deg, #1e6b3b, #0e4a28);
  border: none;
  border-radius: 60px;
  padding: 14px 24px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-size: 0.9rem;
  font-weight: 800;
  width: 100%;
  max-width: 300px;
  color: white;
  box-shadow: 0 10px 20px rgba(0,0,0,0.4);
  transition: 0.2s;
}
.excel-download-btn i { font-size: 1.5rem; }
.excel-download-btn:active { transform: scale(0.97); }

.delete-buttons-container {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin: 15px 0 5px;
}
.delete-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.delete-btn {
  background: transparent;
  border: 1.5px solid var(--danger);
  color: var(--danger);
  padding: 10px 18px;
  border-radius: 30px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 700;
  min-width: 140px;
  flex: 1;
}
.delete-btn:hover { background: rgba(239, 68, 68, 0.1); }
.delete-btn.danger-solid { background: var(--danger); color: white; border-color: var(--danger); }

.system-control-card {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 15px 12px;
  margin-bottom: 15px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(34, 197, 94, 0.3);
}

.control-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 15px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-color);
}
.control-header i { font-size: 1.3rem; color: var(--success); }
.control-header h3 { font-size: 1rem; font-weight: 700; color: var(--text-light); flex: 1; }

.system-wide-switch {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(15, 23, 42, 0.6);
  border: 1px solid var(--border-color);
  border-radius: 14px;
  padding: 15px;
  margin-bottom: 20px;
  border-left: 4px solid var(--success);
}
.system-wide-info { display: flex; align-items: center; gap: 12px; }
.system-wide-info i { font-size: 24px; color: var(--success); }
.system-wide-info span { font-weight: 700; font-size: 14px; }
.system-switch-btn {
  background: transparent;
  border: 1px solid var(--border-color);
  color: var(--text-light);
  padding: 8px 20px;
  border-radius: 30px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 600;
}
.system-switch-btn.on { background: rgba(34, 197, 94, 0.2); border-color: var(--success); color: var(--success); }
.system-switch-btn.off { background: rgba(239, 68, 68, 0.2); border-color: var(--danger); color: var(--danger); }

.option-control-card {
  background: rgba(15, 23, 42, 0.6);
  border: 1px solid var(--border-color);
  border-radius: 14px;
  padding: 10px;
  margin-bottom: 10px;
  border-left: 4px solid;
}
.option-control-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.option-title { display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: 11px; }
.option-switch-btn {
  background: transparent;
  border: 1px solid var(--border-color);
  color: var(--text-light);
  padding: 5px 12px;
  border-radius: 30px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-weight: 600;
}
.option-switch-btn.on { background: rgba(34, 197, 94, 0.2); border-color: var(--success); color: var(--success); }
.option-switch-btn.off { background: rgba(239, 68, 68, 0.2); border-color: var(--danger); color: var(--danger); }
.option-message-box { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border-color); }
.option-message-box textarea {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid var(--border-color);
  background: rgba(0, 0, 0, 0.3);
  color: var(--text-light);
  font-size: 11px;
  min-height: 50px;
  resize: vertical;
  margin-bottom: 6px;
}
.save-option-msg-btn {
  border: none;
  color: white;
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 600;
  background: var(--primary);
}
.option-preview {
  background: rgba(34, 197, 94, 0.05);
  border-left: 3px solid var(--success);
  padding: 6px;
  margin-top: 6px;
  border-radius: 0 6px 6px 0;
  font-size: 0.7rem;
  word-break: break-word;
}

.footer {
  text-align: center;
  margin-top: 8px;
  color: var(--text-gray);
  font-size: 0.7rem;
  padding-top: 10px;
  border-top: 1px solid var(--border-color);
}

.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.95);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s;
  padding: 20px;
}
.modal-overlay.active { opacity: 1; visibility: visible; }
.modal {
  background: var(--card-bg);
  border-radius: 20px;
  width: 100%;
  max-width: 360px;
  padding: 20px;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
  border: 1px solid var(--danger);
}
.modal-header { text-align: center; margin-bottom: 15px; }
.modal-header i { font-size: 2.5rem; color: var(--danger); margin-bottom: 10px; }
.modal-header h2 { color: var(--danger); font-size: 1.4rem; font-weight: 800; }
.modal-body p { margin-bottom: 10px; line-height: 1.5; font-size: 0.9rem; }
.warning-text {
  background: rgba(239, 68, 68, 0.1);
  border-left: 4px solid var(--danger);
  padding: 12px;
  border-radius: 8px;
  margin-top: 12px;
}
.modal-actions { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
.modal-btn {
  padding: 12px 15px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: 700;
  font-size: 0.85rem;
  min-width: 120px;
}
.modal-btn-cancel { background: transparent; border: 1.5px solid var(--border-color); color: var(--text-light); }
.modal-btn-danger { background: var(--danger); color: white; border: 1.5px solid var(--danger); }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--dark-bg); }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
</style>

  fbhotmail0fnd: { name: 'FB Hotmail 0FND', icon: 'fab fa-facebook', cols: ['UID', 'PASSWORD', '2FA', 'HOTMAIL'], paths: ['submissions/fbhotmail0fnd', 'fb_hotmail0fnd_submissions'] },
  fbhotmail30: { name: 'FB Hotmail 30+', icon: 'fab fa-facebook', cols: ['UID', 'PASSWORD', '2FA', 'COOKIES', 'HOTMAIL'], paths: ['submissions/fbhotmail30', 'fb_hotmail30_submissions'] },
  fbpc6155: { name: 'FB PC 61-55', icon: 'fas fa-desktop', cols: ['UID', 'PASSWORD', '2FA'], paths: ['submissions/fbpc6155', 'fb_pc6155_submissions'] }
};

async function loadDataFromPaths(opt) {
  let data = [];
  let config = optionConfig[opt];
  if (!config) return data;
  
  try {
    for (let path of config.paths) {
      const snap = await db.ref(path).once('value');
      if (snap.exists()) {
        Object.values(snap.val()).forEach(d => {
          let item = { 
            uid: d.id || d.username || d.uid || d.user || 'N/A', 
            password: d.password || d.pass || 'N/A' 
          };
          
          if (opt === 'fb0fndcookie') {
            item.cookie = d.code || d.cookie || d.cookie_2fa || 'N/A';
          } 
          else if (opt === 'fbpc1000') {
            item.code = d.code || d.twofa || d.cookie_2fa || 'N/A';
          }
          else if (opt === 'fbhotmail0fnd') { 
            item.code = d.code || d.twofa || 'N/A'; 
            item.hotmail = d.hotmail || d.full_hotmail || 'N/A'; 
          } 
          else if (opt === 'fbhotmail30') { 
            item.code = d.code || d.twofa || 'N/A'; 
            item.cookie = d.cookie || 'N/A'; 
            item.hotmail = d.hotmail || d.full_hotmail || 'N/A'; 
          } 
          else {
            item.code = d.code || d.twofa || d.cookie_2fa || d.cookie || 'N/A';
          }
          data.push(item);
        });
      }
    }
  } catch(e) { console.log(e); }
  
  data = data.filter((item, index, self) => 
    index === self.findIndex(t => t.uid === item.uid && t.password === item.password)
  );
  return data;
}

function groupAccountsByPassword(accounts) {
  let groups = {};
  accounts.forEach(acc => {
    let p = acc.password || "NO_PASSWORD";
    if (!groups[p]) groups[p] = [];
    groups[p].push(acc);
  });
  return Object.keys(groups).map(p => ({ password: p, accounts: groups[p], count: groups[p].length })).sort((a, b) => b.count - a.count);
}

function renderAccountsTable(groups) {
  if (!groups || groups.length === 0) {
    document.getElementById('accountsContainer').innerHTML = `<div style="padding:40px;text-align:center;color:var(--text-gray);"><i class="fas fa-database" style="font-size:3rem;"></i><p>No accounts</p></div>`;
    return;
  }
  let config = optionConfig[currentOption];
  let cols = config.cols;
  let html = `<div class="table-container"><div class="table-header"><div class="header-cell serial-cell">#</div>`;
  cols.forEach(col => { html += `<div class="header-cell">${col}</div>`; });
  html += `</div>`;
  let idx = 0;
  groups.forEach(g => {
    if (g.accounts.length) {
      html += `<div class="password-group-header"><div class="row-cell serial-cell"><div class="cell-content">📁</div></div><div class="row-cell"><div class="cell-content"><i class="fas fa-key"></i> <strong>${g.password}</strong> <span class="group-count">${g.count}</span></div></div>`;
      for (let i = 1; i < cols.length; i++) { html += `<div class="row-cell"><div class="cell-content"></div></div>`; }
      html += `</div>`;
      g.accounts.forEach(acc => {
        idx++;
        html += `<div class="account-row"><div class="row-cell serial-cell"><div class="cell-content">${idx}</div></div>`;
        cols.forEach(col => {
          let val = 'N/A';
          if (col === 'USERNAME' || col === 'UID') val = acc.uid || 'N/A';
          else if (col === 'PASSWORD') val = acc.password || 'N/A';
          else if (col === '2FA') val = acc.code || 'N/A';
          else if (col === 'COOKIE' || col === 'COOKIES') val = acc.cookie || acc.code || 'N/A';
          else if (col === 'HOTMAIL') val = acc.hotmail || 'N/A';
          html += `<div class="row-cell"><div class="cell-content">${val}</div></div>`;
        });
        html += `</div>`;
      });
    }
  });
  html += `</div>`;
  document.getElementById('accountsContainer').innerHTML = html;
}

function updateStats() {
  let total = allAccounts[currentOption]?.length || 0;
  let groups = groupedAccounts[currentOption]?.length || 0;
  let searchRes = filteredGroups?.reduce((s, g) => s + g.accounts.length, 0) || 0;
  document.getElementById('totalCount').innerText = total;
  document.getElementById('groupCount').innerText = groups;
  if (isSearching && currentSearchTerm) {
    document.getElementById('searchCount').innerText = searchRes;
    document.getElementById('searchLabel').innerHTML = `${searchRes} results for "${currentSearchTerm}"`;
    document.getElementById('searchResultCard').style.display = 'flex';
  } else document.getElementById('searchResultCard').style.display = 'none';
  document.getElementById('countDisplay').innerHTML = `${isSearching ? searchRes : total} accounts in ${isSearching ? filteredGroups.length : groups} groups`;
}

function setupRealtimeListener(opt) {
  document.getElementById('accountsContainer').innerHTML = `<div style="padding:30px;text-align:center;"><i class="fas fa-spinner fa-spin"></i> Loading...</div>`;
  const loadData = () => {
    loadDataFromPaths(opt).then(data => {
      allAccounts[opt] = data;
      groupedAccounts[opt] = groupAccountsByPassword(allAccounts[opt]);
      if (!isSearching) filteredGroups = [...groupedAccounts[opt]];
      else searchData(false);
      renderAccountsTable(filteredGroups);
      updateStats();
      document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString();
    });
  };
  loadData();
  let config = optionConfig[opt];
  if (config) {
    for (let path of config.paths) {
      db.ref(path).on('value', () => { loadData(); });
    }
  }
}

function refreshCurrentOption() { setupRealtimeListener(currentOption); }

function switchOption(opt) {
  if (opt === currentOption) return;
  currentOption = opt;
  document.querySelectorAll('.option-tab').forEach(t => {
    if (t.dataset.option === opt) t.classList.add('active');
    else t.classList.remove('active');
  });
  updateUIBasedOnOption();
  isSearching = false;
  currentSearchTerm = "";
  document.getElementById('searchInput').value = "";
  document.getElementById('searchResultCard').style.display = 'none';
  setupRealtimeListener(opt);
}

function updateUIBasedOnOption() {
  let config = optionConfig[currentOption];
  document.getElementById('optionIcon').className = config.icon;
  document.getElementById('optionTitle').innerText = config.name;
  document.getElementById('totalLabel').innerHTML = config.name.substring(0, 8);
  document.getElementById('deleteOptionName').innerHTML = config.name;
}

function searchData(showAlert = true) {
  let term = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!term) {
    isSearching = false;
    currentSearchTerm = "";
    filteredGroups = [...groupedAccounts[currentOption]];
    renderAccountsTable(filteredGroups);
    updateStats();
    return;
  }
  filteredGroups = groupedAccounts[currentOption].map(g => {
    let matches = g.accounts.filter(a => {
      return Object.values(a).some(v => v && v.toString().toLowerCase().includes(term));
    });
    if (matches.length) return { password: g.password, accounts: matches, count: matches.length };
    return null;
  }).filter(g => g !== null);
  isSearching = true;
  currentSearchTerm = term;
  renderAccountsTable(filteredGroups);
  updateStats();
}

function copyAllDataTabSeparated() {
  let accountsToCopy = (isSearching && currentSearchTerm) ? filteredGroups.flatMap(g => g.accounts) : allAccounts[currentOption];
  if (!accountsToCopy?.length) { alert('No data to copy!'); return; }
  let config = optionConfig[currentOption];
  let headers = config.cols;
  let rows = [headers];
  accountsToCopy.forEach(acc => {
    let row = headers.map(h => {
      if (h === 'USERNAME' || h === 'UID') return acc.uid || 'N/A';
      if (h === 'PASSWORD') return acc.password || 'N/A';
      if (h === '2FA') return acc.code || 'N/A';
      if (h === 'COOKIE' || h === 'COOKIES') return acc.cookie || acc.code || 'N/A';
      if (h === 'HOTMAIL') return acc.hotmail || 'N/A';
      return 'N/A';
    });
    rows.push(row);
  });
  let tabSeparated = rows.map(row => row.join('\t')).join('\n');
  navigator.clipboard.writeText(tabSeparated).then(() => {
    alert(`✅ ${accountsToCopy.length} entries copied!`);
  }).catch(() => alert('Copy failed'));
}

function downloadExcelFile() {
  let accountsToExport = (isSearching && currentSearchTerm) ? filteredGroups.flatMap(g => g.accounts) : allAccounts[currentOption];
  if (!accountsToExport?.length) { alert('No data to export!'); return; }
  let config = optionConfig[currentOption];
  let headers = config.cols;
  let rows = [headers];
  accountsToExport.forEach(acc => {
    let row = headers.map(h => {
      if (h === 'USERNAME' || h === 'UID') return acc.uid || 'N/A';
      if (h === 'PASSWORD') return acc.password || 'N/A';
      if (h === '2FA') return acc.code || 'N/A';
      if (h === 'COOKIE' || h === 'COOKIES') return acc.cookie || acc.code || 'N/A';
      if (h === 'HOTMAIL') return acc.hotmail || 'N/A';
      return 'N/A';
    });
    rows.push(row);
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = headers.map(() => ({ wch: 15 }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, `EBH_${currentOption}`);
  XLSX.writeFile(wb, `EBH_${currentOption}_data.xlsx`);
}

function loadSystemStatus() {
  db.ref("system_control").on("value", snap => {
    if (snap.exists()) { let d = snap.val(); systemStatus = d.status !== undefined ? d.status : true; }
    updateSystemSwitch(systemStatus);
  });
}

function updateSystemSwitch(status) {
  let btn = document.getElementById('systemSwitchBtn'), icon = document.getElementById('systemSwitchIcon'), txt = document.getElementById('systemSwitchText');
  if (status) { btn.className = 'system-switch-btn on'; icon.className = 'fas fa-toggle-on'; txt.innerText = 'SYSTEM ON'; }
  else { btn.className = 'system-switch-btn off'; icon.className = 'fas fa-toggle-off'; txt.innerText = 'SYSTEM OFF'; }
}

function toggleSystemStatus() {
  systemStatus = !systemStatus;
  updateSystemSwitch(systemStatus);
  db.ref("system_control").update({ status: systemStatus });
}

function loadOptionStatus() {
  let options = ['instagram', 'fb0fnd2fa', 'fb0fndcookie', 'fbpc1000', 'fbhotmail0fnd', 'fbhotmail30', 'fbpc6155'];
  options.forEach(opt => { optionStatus[opt] = true; optionMessages[opt] = ""; });
  db.ref("option_control").on("value", snap => {
    if (snap.exists()) {
      let d = snap.val();
      options.forEach(opt => {
        if (d[opt]) {
          optionStatus[opt] = d[opt].status !== false;
          optionMessages[opt] = d[opt].message || "";
        }
      });
    }
    renderOptionControls();
  });
}

function renderOptionControls() {
  let options = [
    { key: 'instagram', label: 'IG 2FA', icon: 'fab fa-instagram', color: 'var(--primary)' },
    { key: 'fb0fnd2fa', label: 'FB 0FND 2FA', icon: 'fab fa-facebook', color: 'var(--secondary)' },
    { key: 'fb0fndcookie', label: 'FB 0FND COOKIE', icon: 'fas fa-cookie-bite', color: 'var(--accent)' },
    { key: 'fbpc1000', label: 'PC 1000×', icon: 'fas fa-desktop', color: '#8b5cf6' },
    { key: 'fbhotmail0fnd', label: 'FB Hotmail 0FND', icon: 'fab fa-facebook', color: '#ec4899' },
    { key: 'fbhotmail30', label: 'FB Hotmail 30+', icon: 'fab fa-facebook', color: '#10b981' },
    { key: 'fbpc6155', label: 'FB PC 61-55', icon: 'fas fa-desktop', color: '#f97316' }
  ];
  let html = '';
  options.forEach(opt => {
    let isOn = optionStatus[opt.key];
    let msg = optionMessages[opt.key] || '';
    html += `<div class="option-control-card" style="border-left-color:${opt.color}">
      <div class="option-control-header">
        <div class="option-title"><i class="${opt.icon}"></i> ${opt.label}</div>
        <button class="option-switch-btn ${isOn ? 'on' : 'off'}" onclick="toggleOptionStatus('${opt.key}')">
          <i class="fas ${isOn ? 'fa-toggle-on' : 'fa-toggle-off'}"></i><span>${isOn ? 'ON' : 'OFF'}</span>
        </button>
      </div>
      <div class="option-message-box">
        <textarea id="${opt.key}Message" placeholder="মেসেজ লিখুন">${msg.replace(/</g, '&lt;')}</textarea>
        <button class="save-option-msg-btn" onclick="saveOptionMessage('${opt.key}')" style="background:${opt.color}"><i class="fas fa-save"></i> সেভ করুন</button>
        <div class="option-preview"><strong><i class="fas fa-eye"></i> প্রিভিউ:</strong><span>${msg || 'কোন মেসেজ নেই'}</span></div>
      </div>
    </div>`;
  });
  document.getElementById('optionControls').innerHTML = html;
}

function toggleOptionStatus(opt) {
  optionStatus[opt] = !optionStatus[opt];
  db.ref(`option_control/${opt}`).update({ status: optionStatus[opt], message: optionMessages[opt] || "" });
  renderOptionControls();
}

function saveOptionMessage(opt) {
  let msg = document.getElementById(`${opt}Message`).value.trim();
  optionMessages[opt] = msg;
  db.ref(`option_control/${opt}/message`).set(msg);
  renderOptionControls();
  alert('Message saved');
}

function openDeleteModal(target) {
  deleteTarget = target;
  if (target === 'current') {
    if (allAccounts[currentOption]?.length === 0) { alert('No data to delete!'); return; }
    document.getElementById('deleteModalTitle').innerHTML = `DELETE ${optionConfig[currentOption].name.toUpperCase()} DATA?`;
    document.getElementById('deleteModalMessage').innerHTML = `Delete all ${optionConfig[currentOption].name} data?`;
    document.getElementById('deleteCount').innerText = allAccounts[currentOption].length;
  } else {
    let total = Object.values(allAccounts).reduce((s, a) => s + (a?.length || 0), 0);
    if (total === 0) { alert('No data!'); return; }
    document.getElementById('deleteModalTitle').innerHTML = 'DELETE ALL DATA?';
    document.getElementById('deleteModalMessage').innerHTML = 'Delete ALL accounts from all options?';
    document.getElementById('deleteCount').innerText = total;
  }
  document.getElementById('deleteModal').classList.add('active');
}

function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('active'); }

function confirmDelete() {
  closeDeleteModal();
  if (deleteTarget === 'current') deleteCurrentOptionData();
  else deleteAllData();
}

function deleteCurrentOptionData() {
  let config = optionConfig[currentOption];
  let paths = [...config.paths];
  let updates = {};
  paths.forEach(p => { updates[p] = null; });
  db.ref('used_ids').once('value').then(snap => {
    if (snap.exists()) {
      snap.forEach(ch => {
        let d = ch.val();
        if (d.option === currentOption) updates[`used_ids/${ch.key}`] = null;
      });
    }
    return db.ref().update(updates);
  }).then(() => {
    allAccounts[currentOption] = [];
    groupedAccounts[currentOption] = [];
    filteredGroups = [];
    isSearching = false;
    document.getElementById('searchInput').value = '';
    renderAccountsTable([]);
    updateStats();
    alert(`All ${currentOption} data deleted!`);
    setupRealtimeListener(currentOption);
  }).catch(e => { alert('Delete failed'); setupRealtimeListener(currentOption); });
}

function deleteAllData() {
  let allPaths = [
    "submissions/instagram", "submissions/fb0fnd2fa", "submissions/fb0fndcookie", 
    "submissions/fbpc1000", "submissions/fbhotmail0fnd", "submissions/fbhotmail30", 
    "submissions/fbpc6155", "used_ids",
    "instagram_2fa_submissions", "facebook_2fa_submissions", "facebook_cookie_submissions",
    "fb_pc1000_submissions", "fb_hotmail0fnd_submissions", "fb_hotmail30_submissions", "fb_pc6155_submissions"
  ];
  let updates = {};
  allPaths.forEach(p => { updates[p] = null; });
  db.ref().update(updates).then(() => {
    Object.keys(allAccounts).forEach(k => { allAccounts[k] = []; groupedAccounts[k] = []; });
    filteredGroups = [];
    isSearching = false;
    document.getElementById('searchInput').value = '';
    renderAccountsTable([]);
    updateStats();
    alert('ALL DATA DELETED!');
    setupRealtimeListener(currentOption);
  }).catch(e => alert('Delete all failed'));
}

function loadAllData() {
  loadSystemStatus();
  loadOptionStatus();
  setupRealtimeListener(currentOption);
  updateUIBasedOnOption();
}

document.getElementById('searchInput').addEventListener('keyup', e => {
  if (e.key === 'Enter') searchData();
  if (e.target.value.trim() === '' && isSearching) {
    isSearching = false;
    currentSearchTerm = '';
    filteredGroups = [...groupedAccounts[currentOption]];
    renderAccountsTable(filteredGroups);
    updateStats();
    document.getElementById('searchResultCard').style.display = 'none';
  }
});

loadAllData();
</script>
